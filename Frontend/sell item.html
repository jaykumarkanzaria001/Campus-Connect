<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Item</title>
    <link rel="shortcut icon" href="media/images/logo.jpg" type="image/x-icon">

    <!-- font import css -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            scroll-behavior: smooth;
        }
    </style>
    <!-- header css -->
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: "Inter", sans-serif;
        }

        header {
            margin: 0.8vw;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        nav ul li a.link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: #0f172a;
            /* background: #38bdf8; */
            transition: 0.3s;
        }

        nav ul li a.link:hover::after {
            width: 100%;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 30px;
            background: #172133;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            margin: 30px;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.5);
        }

        .btn a {
            text-decoration: none;
            color: white;
        }

        /* desktop nav style ---------------------------------------------------------------------*/
        #desktop-nav {
            min-height: 10vh;
            border-radius: 35px;
            background-color: #aeaeae;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        /* logo-selection ----------------------------------------------------------------------*/
        #desktop-nav-logo {
            height: 2.8em;
            width: 2.8em;
        }

        #desktop-nav>#desktop-logo-section {
            width: 40vw;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 1.5vw;
            font-size: clamp(1rem, 2vw, 2rem);
            font-weight: 600;
            margin-left: 3vw;
        }

        /* nav-selection ----------------------------------------------------------------------*/
        #desktop-nav>#desktop-nav-section>ul {
            list-style-type: none;
            width: 58vw;
            display: flex;
            justify-content: start;
            align-items: center;
            gap: 5vw;
        }

        #desktop-nav>#desktop-nav-section>ul>li>a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: clamp(0.1rem, 2vw, 1.2rem);
            position: relative;
            transition: 0.3s;
        }

        #desktop-nav>#desktop-nav-section>ul>li:nth-child(2) a {
            color: #2563EB;
        }

        /* mobile nav style ----------------------------------------------------------------------*/
        #mobile-nav {
            min-height: 20vh;
            border-radius: 15px;
            background-color: #aeaeae;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2vh;
        }


        /* logo-selection ----------------------------------------------------------------------*/
        #mobile-nav-logo {
            height: 6rem;
            width: 6rem;
        }

        #mobile-nav>#mobile-logo-section {
            width: 40vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 1.5vw;
            font-size: clamp(0.2rem, 3vw, 2rem);
            font-weight: 600;
            margin-left: 3vw;
        }

        /* nav-selection ----------------------------------------------------------------------*/
        #mobile-nav>#mobile-nav-section>div>img {
            height: 1rem;
            width: 1rem;
            margin-right: 4vw;
        }

        #mobile-nav>#mobile-nav-section>ul {
            list-style-type: none;
            width: 40vw;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-direction: column;
        }

        #mobile-nav>#mobile-nav-section>ul>li {
            position: relative;
        }

        #mobile-nav>#mobile-nav-section>ul>li>a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: clamp(0.4rem, 3.8vw, 1.2rem);
            display: block;
        }

        #mobile-nav>#mobile-nav-section>ul>li>a.link::after {
            content: "";
            width: 0%;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: #0f172a;
            /* background: #38bdf8; */
            transition: 0.3s;
        }


        #mobile-nav>#mobile-nav-section>ul>li>a.link:hover::after {
            width: 100%;
        }

        #mobile-nav>#mobile-nav-section>ul>li:nth-child(2) a {
            color: #2563EB;
        }

        @media only screen and (max-width : 500px) {
            #desktop-nav {
                display: none;
            }
        }

        @media only screen and (min-width : 500px) {
            #mobile-nav {
                display: none;
            }
        }
    </style>
    <!-- content css -->
    <style>
        .page-title {
            color: white;
            text-align: center;
            margin: 50px 0;
        }

        .sell-item-form {
            background-color: #e8eaf6;
            width: 60vw;
            margin: 10vh auto;
            border-radius: 15px;
        }

        .sell-item-form form {
            display: flex;
            flex-direction: column;
            padding: 50px 40px;
        }

        .sell-item-form label {
            font-weight: 500;
            margin-bottom: 5px;
        }

        .sell-item-form input {
            margin-bottom: 10px;
            padding: 5px;
            font-weight: 500;
            border-radius: 5px;
            border: 1px solid grey;
        }

        @media only screen and (max-width: 700px) {
            .sell-item-form {
                width: 80vw;
            }
        }
    </style>
</head>

<body>
    <Header>
        <nav id="desktop-nav">
            <div id="desktop-logo-section">
                <img src="media/images/logo.jpg" alt="Logo" id="desktop-nav-logo">
                <span>CAMPUS CONNECT</span>
            </div>
            <div id="desktop-nav-section">
                <ul>
                    <li><a href="index.html" class="link">Home</a></li>
                    <li><a href="" class="link">Post Item For Sale</a></li>
                </ul>
            </div>
        </nav>
        <nav id="mobile-nav">
            <div id="mobile-logo-section">
                <img src="media/images/logo.jpg" alt="Logo" id="mobile-nav-logo">
                <span>CAMPUS CONNECT</span>
            </div>
            <div id="mobile-nav-section">
                <div>
                    <img src="media/images/hamburger.png" alt="button" onclick="showmenu()">
                </div>
            </div>
        </nav>
    </Header>

    <h1 class="page-title">Post Item For Sale</h1>
    <div class="sell-item-form">
        <form id="sellForm">
            <label for="name">Name of seller</label>
            <input type="text" name="name" id="name" placeholder="Your Name">
            <label for="mobile_no">Mobile no.</label>
            <input type="text" name="mobile_no" id="mobile_no" placeholder="Your Mobile Number">
            <label for="email">Email</label>
            <input type="text" name="email" id="email" placeholder="Your Email Address">
            <label for="item_title">Item Title</label>
            <input type="text" name="item_title" id="item_title" placeholder="e.g., Calculus Textbook">
            <label for="description">Description</label>
            <input type="text" name="description" id="description" placeholder="Description of item">
            <label for="price">Price(Rs)</label>
            <input type="text" name="price" id="price" placeholder="e.g., 20">
            <label for="image_path">Upload Image</label>
            <input type="file" name="image_path" id="image_path">

            <button type="submit" class="btn">Submit</button>
        </form>
    </div>

    <footer></footer>

    <script src="auth.js"></script>
    <script>
        protectPage();
        function showmenu() {
            document.querySelector("#mobile-nav-section").innerHTML = `<ul>
                    <li><a href="index.html" class="link">Home</a></li>
                    <li><a href="sell item.html" class="link">Post Item For Sale</a></li>
                </ul>`;
        }


        // admin role hide
        const role = localStorage.getItem("userRole");
        const token = localStorage.getItem("jwtToken");

        document.getElementById("sellForm").addEventListener("submit", async function (e) {
            e.preventDefault(); // stop page reload

            const form = this;

            const formData = new FormData(form);
            // formData.append("name", document.getElementById("name").value);
            // formData.append("mobile_no", document.getElementById("mobile_no").value);
            // formData.append("email", document.getElementById("email").value);
            // formData.append("item_title", document.getElementById("item_title").value);
            // formData.append("description", document.getElementById("description").value);
            // formData.append("price", document.getElementById("price").value);
            // formData.append("image_path", document.getElementById("image_path").files[0]);

            try {
                const response = await fetch("https://campus-connect-msu.runasp.net/api/buysell/sell", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + token
                    },
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    alert("Item posted successfully!");
                    form.reset();
                } else {
                    alert("Error posting item.");
                }

            } catch (error) {
                console.error("Error:", error);
            }
        });
    </script>
</body>

</html>
