<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Lost & Found Item</title>
    <link rel="shortcut icon" href="media/images/logo.jpg" type="image/x-icon">

    <!-- font import css -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            scroll-behavior: smooth;
        }
    </style>
    <!-- header css -->
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: "Inter", sans-serif;
        }

        header {
            margin: 0.8vw;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        nav ul li a.link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: #0f172a;
            /* background: #38bdf8; */
            transition: 0.3s;
        }

        nav ul li a.link:hover::after {
            width: 100%;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 30px;
            background: #172133;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.5);
        }

        .btn a {
            text-decoration: none;
            color: white;
        }

        /* desktop nav style ---------------------------------------------------------------------*/
        #desktop-nav {
            min-height: 10vh;
            border-radius: 35px;
            background-color: #aeaeae;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        /* logo-selection ----------------------------------------------------------------------*/
        #desktop-nav-logo {
            height: 2.8em;
            width: 2.8em;
        }

        #desktop-nav>#desktop-logo-section {
            width: 40vw;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 1.5vw;
            font-size: clamp(1rem, 2vw, 2rem);
            font-weight: 600;
            margin-left: 3vw;
        }

        /* nav-selection ----------------------------------------------------------------------*/
        #desktop-nav>#desktop-nav-section>ul {
            list-style-type: none;
            width: 58vw;
            display: flex;
            justify-content: start;
            align-items: center;
            gap: 5vw;
        }

        #desktop-nav>#desktop-nav-section>ul>li>a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: clamp(0.1rem, 2vw, 1.2rem);
            position: relative;
            transition: 0.3s;
        }

        #desktop-nav>#desktop-nav-section>ul>li:nth-child(2) a {
            color: #2563EB;
        }

        /* mobile nav style ----------------------------------------------------------------------*/
        #mobile-nav {
            min-height: 20vh;
            border-radius: 15px;
            background-color: #aeaeae;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2vh;
        }


        /* logo-selection ----------------------------------------------------------------------*/
        #mobile-nav-logo {
            height: 6rem;
            width: 6rem;
        }

        #mobile-nav>#mobile-logo-section {
            width: 40vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 1.5vw;
            font-size: clamp(0.2rem, 3vw, 2rem);
            font-weight: 600;
            margin-left: 3vw;
        }

        /* nav-selection ----------------------------------------------------------------------*/
        #mobile-nav>#mobile-nav-section>div>img {
            height: 1rem;
            width: 1rem;
            margin-right: 4vw;
        }

        #mobile-nav>#mobile-nav-section>ul {
            list-style-type: none;
            width: 40vw;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-direction: column;
        }

        #mobile-nav>#mobile-nav-section>ul>li {
            position: relative;
        }

        #mobile-nav>#mobile-nav-section>ul>li>a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: clamp(0.4rem, 3.8vw, 1.2rem);
            display: block;
        }

        #mobile-nav>#mobile-nav-section>ul>li>a.link::after {
            content: "";
            width: 0%;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: #0f172a;
            /* background: #38bdf8; */
            transition: 0.3s;
        }


        #mobile-nav>#mobile-nav-section>ul>li>a.link:hover::after {
            width: 100%;
        }

        #mobile-nav>#mobile-nav-section>ul>li:nth-child(2) a {
            color: #2563EB;
        }

        @media only screen and (max-width : 500px) {
            #desktop-nav {
                display: none;
            }
        }

        @media only screen and (min-width : 500px) {
            #mobile-nav {
                display: none;
            }
        }
    </style>
    <!-- report section css -->
    <style>
        .report-section {
            width: 100%;
            /* background-color: #0f172a; */
            /* background-color: #4e50ec; */
            padding: 5vh 0;
        }

        .report {
            width: 60vw;
            margin: auto;
            display: flex;
            flex-direction: column;
            /* background-color: white; */
            color: white;
            border-radius: 10px;
        }

        .report h2 {
            text-align: center;
            font-size: 3em;
            font-weight: 500;
            margin: 3vh auto;
        }

        .report p {
            text-align: center;
            font-size: 1.1em;
            margin: 3vh auto;
        }

        .report form {
            display: flex;
            flex-direction: column;
            width: 50vw;
            margin: auto;
        }

        .report select,
        select option,
        input {
            padding: 10px 5px;
            margin: 5px 0;
            border: 1px solid black;
            border-radius: 5px;
            box-sizing: border-box;
            background-color: #172133 !important;
            color: white;
        }

        input[type="datetime-local"] {
            color-scheme: dark;
        }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #172133 inset !important;
            -webkit-text-fill-color: white !important;
        }

        select:enabled {
            background-color: #172133;
        }

        .report form .form-button {
            width: 50vw;
            margin: 5vh auto;
            display: flex;
            justify-content: space-evenly;
        }

        .form-grp {
            display: flex;
            flex-direction: column;
            width: 50vw;
            margin: 10px 0;
        }

        .form-grp-horizontal {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 10px 0;
        }

        @media only screen and (max-width:700px) {

            .report,
            .report-form,
            .report form {
                width: 80vw;
                align-items: center;
            }

            .report-head h2 {
                font-size: 2em;
            }

            .form-grp {
                width: 70vw;
            }

            .form-grp-horizontal {
                flex-direction: column;
                width: 70vw;
            }

            form input,
            select {
                width: 70vw;
                box-sizing: border-box;
            }

            .form-button {
                flex-direction: column;
                gap: 2vh;
            }

            .form-button>.btn {
                font-size: 1em;
            }
        }
    </style>
</head>

<body>
    <Header>
        <nav id="desktop-nav">
            <div id="desktop-logo-section">
                <img src="media/images/logo.jpg" alt="Logo" id="desktop-nav-logo">
                <span>CAMPUS CONNECT</span>
            </div>
            <div id="desktop-nav-section">
                <ul>
                    <li><a href="index.html" class="link">Home</a></li>
                    <li><a href="" class="link">Report item</a></li>
                </ul>
            </div>
        </nav>
        <nav id="mobile-nav">
            <div id="mobile-logo-section">
                <img src="media/images/logo.jpg" alt="Logo" id="mobile-nav-logo">
                <span>CAMPUS CONNECT</span>
            </div>
            <div id="mobile-nav-section">
                <div>
                    <img src="media/images/hamburger.png" alt="button" onclick="showmenu()">
                </div>
            </div>
        </nav>
    </Header>

    <div class="report-section">
        <div class="report">
            <div class="report-head">
                <h2>Report Item</h2>
            </div>
            <div class="report-form">
                <form id="report-item">
                    <div class="form-grp-horizontal">
                        <div class="form-grp">
                            <label for="item_name">Item Name</label>
                            <input type="text" name="item_name" id="item_name"
                                placeholder="Where is this Item Founded?">
                        </div>
                        <div class="form-grp">
                            <label for="category">Category</label>
                            <select name="category" id="category">
                                <option value="" hidden selected>Select Category...</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Document">Document</option>
                                <option value="Book & Stationery">Book & Stationery</option>
                                <option value="Accessories">Accessories</option>
                                <option value="Bags / Wallets">Bags / Wallets</option>
                                <option value="Clothing">Clothing</option>
                                <option value="Keys">Keys</option>
                                <option value="Water Bottle / Lunch Box">Water Bottle / Lunch Box</option>
                                <option value="Sports Items">Sports Items</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-grp">
                        <label for="description">Description</label>
                        <input type="text" name="description" id="description"
                            placeholder="Please describe your item in detail...">
                    </div>
                    <div class="form-grp-horizontal">
                        <div class="form-grp">
                            <label for="datetime">Date & Time</label>
                            <input type="datetime-local" name="datetime" id="datetime"
                                placeholder="Where is this Item Founded?">
                        </div>
                        <div class="form-grp">
                            <label for="location">Location (Where Lost & Found)</label>
                            <input type="text" name="location" id="location"
                                placeholder="Where was that Item (Lost & Found) ?">
                        </div>
                    </div>
                    <div class="form-grp-horizontal">
                        <div class="form-grp">
                            <label for="status">Status</label>
                            <select name="status" id="status">
                                <option value="" hidden selected>Lost / Found</option>
                                <option value="Lost">Lost</option>
                                <option value="Found">Found</option>
                            </select>
                        </div>
                        <div class="form-grp">
                            <label for="contact_information">Contact Information</label>
                            <input type="text" name="contact_information" id="contact_information"
                                placeholder="Mobile No...">
                        </div>
                    </div>
                    <div class="form-grp">
                        <label for="image_path">Upload image</label>
                        <input type="file" name="image_path" id="image_path">
                    </div>

                    <div class="form-button">
                        <button type="submit" class="btn">Submit Item</button>
                        <button type="reset" class="btn">Clear Form</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer></footer>
    
    <script src="auth.js"></script>
    <script>
        protectPage();
        function showmenu() {
            document.querySelector("#mobile-nav-section").innerHTML = `<ul>
                    <li><a href="index.html" class="link">Home</a></li>
                    <li><a href="report lost & found.html" class="link">Report item</a></li>
                </ul>`;
        }

        
        // Admin role hide
        const role = localStorage.getItem("userRole");
        const token = localStorage.getItem("jwtToken");

        // submit report of lost and found
        document.getElementById("report-item").addEventListener("submit", async function (e) {
            e.preventDefault();

            const form = this;
            const formData = new FormData(form);

            try {
                const response = await fetch("https://campus-connect-msu.runasp.net/api/lostfound/report", {
                    method: "POST",
                    headers:{
                        "Authorization": "Bearer " + token
                    },
                    body: formData
                });

                const result = await response.json();
                alert(result.message);

                form.reset();

            } catch (err) {
                alert("Error submitting complaint");
            }
        });
    </script>
</body>

</html>
