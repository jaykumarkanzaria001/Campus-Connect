<!-- footer css -->
<style>
    footer {
        color: #ffffff;
        background-color: #181C24;
        padding-bottom: 2vw;
    }

    .footer-area {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        justify-items: center;
    }

    .footer-part {
        width: 20vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        row-gap: 2vh;
        margin-top: 2vw;
    }

    .footer-content-header {
        font-size: 1.5em;
        font-weight: bold;
    }

    .footer-content-description {
        display: flex;
        flex-direction: column;
        width: 15vw;

    }

    .footer-content-description a {
        text-decoration: none;
        color: #ffffff;
    }

    .footer-content-description div {
        word-break: break-word;
    }

    .footer-content-follow {
        display: flex;
        flex-direction: row;
        gap: 2vw;
        justify-content: center;
    }

    .follow {
        height: 1.6vw;
        width: 1.6vw;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #d9d9d9;
        border-radius: 50%;
    }

    .follow-logo {
        width: 1.6vw;
        display: block;
    }

    hr {
        background-color: #1F2937;
        border: none;
        height: 2px;
        width: 90vw;
        margin: 2vw auto;
    }

    .copyright {
        text-align: center;
    }

    @media only screen and (max-width : 700px) {
        .footer-area {
            grid-template-columns: 1fr 1fr;
        }

        .footer-part {
            width: 40vw;
        }

        .footer-content-header {
            font-size: 1.5em;
            font-weight: bold;
        }

        .footer-content-description {
            width: 30vw;
        }

        .footer-content-follow {
            gap: 5vw;
        }

        .follow a img {
            height: 3vw;
            width: 3vw;
            display: block;
        }

        .follow {
            height: 3vw;
            width: 3vw;
            display: block;
        }
    }
</style>
